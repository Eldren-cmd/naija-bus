name: Deploy Frontend (Vercel)

on:
  push:
    branches:
      - main
    paths:
      - "frontend/**"
      - "vercel.json"
      - ".github/workflows/deploy-frontend.yml"

concurrency:
  group: deploy-frontend-production
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Frontend to Vercel Production
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm --prefix frontend ci

      - name: Run frontend lint
        run: npm --prefix frontend run lint

      - name: Run frontend build
        run: npm --prefix frontend run build

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel project settings
        run: vercel pull --yes --environment=production --token="$VERCEL_TOKEN"

      - name: Deploy to Vercel production
        id: deploy_vercel
        run: |
          DEPLOYMENT_OUTPUT=$(vercel deploy --prod --yes --token="$VERCEL_TOKEN")
          DEPLOYMENT_URL=$(echo "$DEPLOYMENT_OUTPUT" | tail -n 1 | tr -d '\r')

          if [ -z "$DEPLOYMENT_URL" ]; then
            echo "Failed to resolve Vercel deployment URL from deploy output."
            echo "$DEPLOYMENT_OUTPUT"
            exit 1
          fi

          echo "$DEPLOYMENT_OUTPUT"
          echo "deployment_url=$DEPLOYMENT_URL" >> "$GITHUB_OUTPUT"

      - name: Update naijatransport alias
        run: vercel alias set "${{ steps.deploy_vercel.outputs.deployment_url }}" naijatransport.vercel.app --token="$VERCEL_TOKEN"
